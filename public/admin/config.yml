local_backend:
  url: http://localhost:8081/api/v1
  allowed_hosts: ["127.0.0.1", "localhost"]

backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: "https://prahlad-workshop-site.netlify.app"
display_url: "https://prahlad-workshop-site.netlify.app"
logo_url: "/favicon.svg"

slug:
  encoding: "ascii"
  clean_accents: true

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Main post headline" }
      - { label: "Subtitle / Dek", name: "description", widget: "text", hint: "Short one- or two-line summary shown under the title" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false, hint: "Draft posts stay hidden from the site" }
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
      - { label: "Cover Image Alt", name: "coverImageAlt", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false, hint: "Used in search and archive filters" }
      - { label: "Author Note", name: "authorNote", widget: "text", required: false, hint: "Optional note shown after the article" }
      - label: "Article"
        name: "body"
        widget: "richtext"
        hint: "Place the cursor between paragraphs and use the image control to upload or insert as many inline images as needed."
        modes: ["rich_text", "raw"]
        buttons:
          - "bold"
          - "italic"
          - "strikethrough"
          - "code"
          - "link"
          - "heading-two"
          - "heading-three"
          - "quote"
          - "bulleted-list"
          - "numbered-list"
        editor_components:
          - "image"
          - "code-block"

  - name: "notes"
    label: "Notes"
    folder: "src/content/notes"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
      - label: "Type"
        name: "kind"
        widget: "select"
        options:
          - { label: "Bookmark", value: "bookmark" }
          - { label: "Photo", value: "photo" }
          - { label: "Note", value: "note" }
        default: "note"
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Image", name: "coverImage", widget: "image", required: false }
      - { label: "Image Alt", name: "coverImageAlt", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Bookmark URL", name: "externalUrl", widget: "string", required: false }
      - { label: "Text", name: "body", widget: "markdown", required: false }

  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
      - { label: "Cover Image Alt", name: "coverImageAlt", widget: "string", required: false }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["idea", "active", "paused", "shipped"]
        default: "active"
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "External URL", name: "externalUrl", widget: "string", required: false }
      - { label: "Author Note", name: "authorNote", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "about"
    label: "About"
    files:
      - label: "About Writeup"
        name: "about"
        file: "src/content/about/about.md"
        fields:
          - { label: "Writeup", name: "writeup", widget: "text" }
